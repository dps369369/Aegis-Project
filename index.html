<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aegis | Personal Growth System</title>
    <link rel="stylesheet" href="./CSS/style.css">
</head>

<body>
    <!-- Header Section -->
    <header>
        <nav>
            <h1>Aegis</h1>

            <div class="nav-actions">
                <a href="#">Home</a>
                <a href="#">Status</a>
                <a href="#">Create</a>
                <a href="#">Login</a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="dashboard">
        <section class="welcome">
            <h2>Welcome to Aegis</h2>

            <p>Your personal growth system.</p>
        </section>

<section class="habits">

    <h2>Today's Habits</h2>

    <div class="habit-list">

        <div class="habit-card">
            <h3>Learn Programming</h3>
            <p>Category: Learning</p>
            <button>Complete</button>
        </div>


        <div class="habit-card">
            <h3>Exercise</h3>
            <p>Category: Health</p>
            <button>Complete</button>
        </div>


        <div class="habit-card">
            <h3>Read</h3>
            <p>Category: Knowledge</p>
            <button>Complete</button>
        </div>

    </div>

</section>

        <section class="reflection">
            <h2>Daily Reflection</h2>

            <textarea placeholder="Write about your day..."></textarea>
        </section>

        <section class="progress">
            <h2>Your Progress</h2>

            <p>Current streak: 0 days</p>
        </section>
    </main>

    <!-- Footer Section -->
    <footer></footer>
    <script src="./JS/brain.js"></script>
</body>

</html>
