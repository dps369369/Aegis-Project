<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aegis | Personal Growth System</title>
    <link rel="stylesheet" href="./CSS/global.css">
    <link rel="stylesheet" href="./CSS/home.css">
</head>

<body>
    <!-- Header Section -->
    <header>
        <nav>
            <h1>Aegis</h1>

            <div class="nav-actions">
                <a href="index.html">Home</a>
                <a href="status.html">Status</a>
                <a href="cultivate.html">Cultivate</a>
                <a href="eliminate.html">Eliminate</a>
                <a href="login.html">Login</a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="dashboard">
        <section class="welcome">
            <h2>Welcome to Aegis</h2>

            <p>Your personal growth system.</p>
        </section>

        <section class="habits">

            <h2>Today's Habits</h2>

            <div class="habit-list" id="habit-container">

            </div>
            <div id="empty-state" class="empty-state">

                <h2>🌱</h2>

                <h3>Your garden is empty.</h3>

                <p>Plant your first habit to begin your journey.</p>

                <a href="cultivate.html" class="cultivate-link">
                    + Cultivate Habit
                </a>

            </div>
        </section>

        <section class="reflection">
            <h2>Daily Reflection</h2>

            <textarea placeholder="Write about your day..."></textarea>
        </section>

        <section class="progress">

            <h2>Your Progress</h2>

            <p>Completed:
                <span id="completed-count">0</span>
            </p>

            <p id="star-rating">☆☆☆</p>

        </section>
    </main>

    <!-- Footer Section -->
    <footer></footer>
    <script src="./JS/home.js"></script>
